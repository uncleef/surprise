<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La tua sorpresa 🔒</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #181818;
      --border: #2a2a2a;
      --accent: #e8c87a;
      --accent-dim: #a88a3a;
      --text: #f0ece0;
      --muted: #6b6b6b;
      --error: #c0392b;
      --success: #27ae60;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
    }

    header p.eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--text);
      line-height: 1.1;
    }

    .timeline {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step {
      display: flex;
      gap: 20px;
      position: relative;
    }

    .step:not(:last-child) .line {
      position: absolute;
      left: 19px;
      top: 40px;
      width: 2px;
      bottom: -8px;
      background: var(--border);
    }

    .step.unlocked:not(:last-child) .line {
      background: var(--accent-dim);
    }

    .dot-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      padding-top: 8px;
    }

    .dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
      z-index: 1;
      transition: all 0.3s;
    }

    .step.unlocked .dot {
      border-color: var(--accent);
      color: var(--accent);
    }

    .step.solved .dot {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }

    .step.unlocked .card { border-color: #3a3a3a; }
    .step.solved .card { border-color: var(--accent-dim); }

    .card-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--text);
      margin-bottom: 16px;
    }

    .locked-msg {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]:disabled { opacity: 0.4; }

    button {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.3; cursor: default; }

    .feedback {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
    }

    .feedback.error { color: var(--error); }
    .feedback.success { color: var(--success); }

    .reward {
      margin-top: 12px;
      padding: 14px;
      background: #0e1a0e;
      border: 1px solid var(--success);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      display: none;
    }

    .reward a { color: var(--accent); font-weight: 600; }
    .reward.visible { display: block; }

    .solved-badge {
      display: inline-block;
      font-size: 11px;
      background: var(--accent);
      color: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    footer {
      margin-top: 64px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">La tua missione</p>
  <h1>Cinque indizi.<br>Una sorpresa.</h1>
</header>

<div class="timeline" id="timeline"></div>

<footer>Un indizio alla volta. Niente fretta.</footer>

<script>
  const STORAGE_KEY = "surprise_hunt_v1";

  const STEPS = [
    {
      day: "Lunedì · 16 jun",
      title: "Il primo indizio",
      unlockAt: null,
      answer: "passaporto",
      rewardHTML: `Brava. Ora scarica questa app: <a href="https://apps.apple.com/app/uk-eta/id6444912481" target="_blank">→ Scarica ETA UK</a>`
    },
    {
      day: "Martedì · 16 jun",
      title: "Secondo indizio",
      unlockAt: new Date("2026-06-16T15:00:00"),
      answer: "sorpresa",
      rewardHTML: `Giusto. Il tuo numero è: <strong>26</strong>`
    },
    {
      day: "Mercoledì · 17 jun",
      title: "Terzo indizio",
      unlockAt: new Date("2026-06-17T15:00:00"),
      answer: "valigia",
      rewardHTML: `Esatto. Il tuo numero è: <strong>06</strong>`
    },
    {
      day: "Giovedì · 18 jun",
      title: "Quarto indizio",
      unlockAt: new Date("2026-06-18T15:00:00"),
      answer: "aereo",
      rewardHTML: `Perfetto. Il tuo numero è: <strong>19</strong>`
    },
    {
      day: "Venerdì · 19 jun",
      title: "Ultimo indizio",
      unlockAt: new Date("2026-06-19T10:00:00"),
      answer: "concerto",
      rewardHTML: `Hai completato tutto. Controlla la tua mail — c'è qualcosa che ti aspetta. 🎤`
    }
  ];

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
    catch { return {}; }
  }

  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function isUnlocked(step) {
    if (!step.unlockAt) return true;
    return new Date() >= step.unlockAt;
  }

  function formatUnlock(date) {
    return `Si sblocca il ${date.toLocaleDateString('it-IT', {weekday:'long', day:'numeric', month:'long'})} alle ${date.getHours()}:00`;
  }

  function render() {
    const state = loadState();
    const timeline = document.getElementById("timeline");
    timeline.innerHTML = "";

    STEPS.forEach((step, i) => {
      const unlocked = isUnlocked(step);
      const solved = !!state[i];

      const stepEl = document.createElement("div");
      stepEl.className = `step ${unlocked ? "unlocked" : ""} ${solved ? "solved" : ""}`;

      let cardBody;
      if (solved) {
        cardBody = `
          <span class="solved-badge">Completato</span>
          <div class="reward visible">${step.rewardHTML}</div>
        `;
      } else if (!unlocked) {
        cardBody = `<p class="locked-msg">${formatUnlock(step.unlockAt)}</p>`;
      } else {
        cardBody = `
          <div class="input-row">
            <input type="text" id="input-${i}" placeholder="La tua risposta…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
            <button id="btn-${i}" onclick="checkAnswer(${i})">→</button>
          </div>
          <div class="feedback" id="feedback-${i}"></div>
          <div class="reward" id="reward-${i}">${step.rewardHTML}</div>
        `;
      }

      stepEl.innerHTML = `
        <div class="dot-col">
          <div class="dot">${solved ? "✓" : i + 1}</div>
          ${i < STEPS.length - 1 ? '<div class="line"></div>' : ''}
        </div>
        <div class="card">
          <div class="card-label">${step.day}</div>
          <div class="card-title">${step.title}</div>
          ${cardBody}
        </div>
      `;

      timeline.appendChild(stepEl);
    });
  }

  function checkAnswer(i) {
    const input = document.getElementById(`input-${i}`);
    const feedback = document.getElementById(`feedback-${i}`);
    const reward = document.getElementById(`reward-${i}`);
    const btn = document.getElementById(`btn-${i}`);

    const val = input.value.trim().toLowerCase();
    const expected = STEPS[i].answer.toLowerCase();

    if (val === expected) {
      feedback.className = "feedback success";
      feedback.textContent = "Risposta corretta!";
      reward.classList.add("visible");
      input.disabled = true;
      btn.disabled = true;
      const state = loadState();
      state[i] = true;
      saveState(state);
    } else {
      feedback.className = "feedback error";
      feedback.textContent = "Non è questa. Riprova.";
      input.value = "";
      input.focus();
    }
  }

  document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const focused = document.activeElement;
    if (focused && focused.id && focused.id.startsWith("input-")) {
      const i = parseInt(focused.id.split("-")[1]);
      checkAnswer(i);
    }
  });

  render();
  setInterval(render, 60000);
</script>
</body>
</html>
